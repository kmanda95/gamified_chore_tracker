<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏠 Chore Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151821;
      --surface2: #1c2030;
      --border: #252a3a;
      --text: #e8eaf6;
      --muted: #6b7280;
      --p1-color: #7c6af5;
      --p1-light: #a69af8;
      --p2-color: #f5a56a;
      --p2-light: #f8c49a;
      --gold: #fbbf24;
      --green: #34d399;
      --red: #f87171;
      --radius: 16px;
      --gap: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,245,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(245,165,106,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--p1-light), var(--p2-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    #last-updated {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* ── Month banner ── */
    .month-banner {
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Grid layouts ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--gap); }

    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      animation: fadeUp 0.5s ease both;
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    /* ── Player cards ── */
    .player-card {
      position: relative;
      overflow: hidden;
    }

    .player-card.p1 { border-color: rgba(124,106,245,0.4); }
    .player-card.p2 { border-color: rgba(245,165,106,0.4); }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .player-card.p1::before { background: linear-gradient(90deg, var(--p1-color), var(--p1-light)); }
    .player-card.p2::before { background: linear-gradient(90deg, var(--p2-color), var(--p2-light)); }

    .player-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .p1 .player-name { color: var(--p1-light); }
    .p2 .player-name { color: var(--p2-light); }

    .player-level {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .p1 .level-badge { background: rgba(124,106,245,0.2); color: var(--p1-light); border: 1px solid rgba(124,106,245,0.3); }
    .p2 .level-badge { background: rgba(245,165,106,0.2); color: var(--p2-light); border: 1px solid rgba(245,165,106,0.3); }

    .xp-big {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      margin: 12px 0 4px;
    }
    .p1 .xp-big { color: var(--p1-light); }
    .p2 .xp-big { color: var(--p2-light); }

    .xp-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* XP progress bar */
    .xp-progress {
      margin-top: 16px;
    }
    .xp-progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 6px;
    }
    .xp-progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(.16,1,.3,1);
    }
    .p1 .xp-progress-bar-fill { background: linear-gradient(90deg, var(--p1-color), var(--p1-light)); }
    .p2 .xp-progress-bar-fill { background: linear-gradient(90deg, var(--p2-color), var(--p2-light)); }

    .xp-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Mini stats row */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .mini-stat { text-align: center; }
    .mini-stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .p1 .mini-stat-val { color: var(--p1-light); }
    .p2 .mini-stat-val { color: var(--p2-light); }
    .mini-stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }

    /* ── VS Banner ── */
    .vs-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: var(--gap);
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .vs-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .vs-bar-bg {
      flex: 1;
      height: 12px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .vs-bar-p1 {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--p1-color), var(--p1-light));
      border-radius: 99px;
      transition: width 1.4s cubic-bezier(.16,1,.3,1);
    }

    .vs-name {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 70px;
    }
    .vs-name.p1 { color: var(--p1-light); text-align: right; }
    .vs-name.p2 { color: var(--p2-light); }

    .vs-center { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: 8px; }

    /* ── Charts ── */
    .chart-container { position: relative; height: 200px; }

    /* ── Level ladder ── */
    .level-ladder {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .level-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .level-row.active {
      background: rgba(255,255,255,0.06);
      border-color: var(--border);
    }

    .level-row.achieved { opacity: 0.4; }
    .level-row .emoji { width: 22px; text-align: center; }
    .level-row .level-name { flex: 1; font-weight: 500; }
    .level-row .level-xp { font-size: 0.75rem; color: var(--muted); }

    /* ── Recent log ── */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .log-table td {
      padding: 10px 8px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .log-table tr:last-child td { border-bottom: none; }

    .log-partner-p1 { color: var(--p1-light); font-weight: 600; }
    .log-partner-p2 { color: var(--p2-light); font-weight: 600; }

    .xp-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(52,211,153,0.15);
      color: var(--green);
      border: 1px solid rgba(52,211,153,0.25);
    }

    /* ── Loading / error states ── */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--p1-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* ── Section headers ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 32px 0 14px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }

    /* ── Config banner ── */
    .config-notice {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.83rem;
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏠 Chore Quest</h1>
      <p>Household XP tracker — because adulting deserves rewards</p>
      <span id="last-updated">Loading...</span>
    </header>

    <div id="app">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Loading your stats...</div>
      </div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    // Point this at your deployed Cloudflare Worker URL
    const API_BASE = 'https://chore-tracker-worker.kayla-a-mandel.workers.dev/api/stats';

    const LEVELS = [
      { name: 'Rookie',      minXP: 0,    emoji: '🌱' },
      { name: 'Apprentice',  minXP: 50,   emoji: '🔨' },
      { name: 'Helper',      minXP: 125,  emoji: '🧹' },
      { name: 'Contributor', minXP: 250,  emoji: '⭐' },
      { name: 'Reliable',    minXP: 400,  emoji: '💪' },
      { name: 'Pro',         minXP: 600,  emoji: '🔥' },
      { name: 'Expert',      minXP: 850,  emoji: '🏅' },
      { name: 'Master',      minXP: 1150, emoji: '🥇' },
      { name: 'Legend',      minXP: 1500, emoji: '👑' },
    ];

    function getLevelForXP(xp) {
      return LEVELS.reduce((best, l) => xp >= l.minXP ? l : best, LEVELS[0]);
    }
    function getNextLevel(xp) {
      return LEVELS.find(l => l.minXP > xp) || null;
    }
    function xpProgressPct(xp) {
      const curr = getLevelForXP(xp);
      const next = getNextLevel(xp);
      if (!next) return 100;
      const range = next.minXP - curr.minXP;
      const progress = xp - curr.minXP;
      return Math.round((progress / range) * 100);
    }

    // ── Fetch & render ───────────────────────────────────────────────────────
    async function loadData() {
      try {
        const [statsRes, dailyRes, logRes] = await Promise.all([
          fetch(`${API_BASE}/api/stats`),
          fetch(`${API_BASE}/api/daily`),
          fetch(`${API_BASE}/api/log`),
        ]);
        if (!statsRes.ok) throw new Error(`Stats API: HTTP ${statsRes.status}`);

        const [statsData, dailyData, logData] = await Promise.all([
          statsRes.json(),
          dailyRes.ok ? dailyRes.json() : null,
          logRes.ok ? logRes.json() : [],
        ]);

        render(statsData, dailyData, logData);
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="config-notice">
            ⚠️ Could not connect to the worker API. Update <code>API_BASE</code> in this file to your deployed Worker URL, then refresh.
          </div>
          <div class="loading-state" style="color:#f87171">Error: ${err.message}</div>
        `;
      }
    }

    function render(data, dailyData, logData) {
      const { partner1: p1, partner2: p2 } = data;
      const now = new Date();
      const monthName = now.toLocaleString('default', { month: 'long', year: 'numeric' });

      const totalBoth = (p1.monthXP || 0) + (p2.monthXP || 0);
      const p1Pct = totalBoth ? Math.round((p1.monthXP / totalBoth) * 100) : 50;

      const p1Level = getLevelForXP(p1.monthXP || 0);
      const p2Level = getLevelForXP(p2.monthXP || 0);
      const p1Next = getNextLevel(p1.monthXP || 0);
      const p2Next = getNextLevel(p2.monthXP || 0);

      document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString()}`;

      document.getElementById('app').innerHTML = `
        <div class="month-banner">⚔️ ${monthName} — Monthly Rankings Reset on the 1st</div>

        <!-- VS banner -->
        <div class="vs-banner">
          <div class="vs-inner">
            <span class="vs-name p1">${p1.partnerName || 'Partner 1'}<br><small style="color:var(--muted)">${p1.monthXP} XP</small></span>
            <div class="vs-bar-bg">
              <div class="vs-bar-p1" id="vs-bar" style="width:0%"></div>
            </div>
            <span class="vs-name p2">${p2.partnerName || 'Partner 2'}<br><small style="color:var(--muted)">${p2.monthXP} XP</small></span>
          </div>
          <div class="vs-center" id="vs-label">...</div>
        </div>

        <!-- Player cards -->
        <div class="grid-2">
          ${playerCard(p1, 'p1', p1Level, p1Next)}
          ${playerCard(p2, 'p2', p2Level, p2Next)}
        </div>

        <!-- Charts -->
        <div class="section-title">📈 Weekly Activity</div>
        <div class="grid-2">
          <div class="card">
            <div class="card-label">XP by Day (This Week)</div>
            <div class="chart-container">
              <canvas id="weekChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-label">Monthly XP Trend</div>
            <div class="chart-container">
              <canvas id="monthChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Level ladder -->
        <div class="section-title">🎮 Level Ladder</div>
        <div class="grid-2">
          <div class="card">
            <div class="card-label">${p1.partnerName || 'Partner 1'}'s Progress</div>
            <div class="level-ladder">${levelLadder(p1.monthXP || 0, 'p1')}</div>
          </div>
          <div class="card">
            <div class="card-label">${p2.partnerName || 'Partner 2'}'s Progress</div>
            <div class="level-ladder">${levelLadder(p2.monthXP || 0, 'p2')}</div>
          </div>
        </div>

        <!-- Recent log -->
        <div class="section-title">📋 Recent Chores</div>
        <div class="card">
          <div id="recent-log">
            <div class="loading-state" style="padding:20px">
              <div class="spinner" style="width:20px;height:20px;border-width:2px"></div>
            </div>
          </div>
        </div>
      `;

      // Animate VS bar after render
      requestAnimationFrame(() => {
        const bar = document.getElementById('vs-bar');
        if (bar) {
          setTimeout(() => { bar.style.width = `${p1Pct}%`; }, 100);
        }
        const label = document.getElementById('vs-label');
        if (label) {
          if (p1.monthXP > p2.monthXP) label.textContent = `🥇 ${p1.partnerName || 'P1'} is winning this month`;
          else if (p2.monthXP > p1.monthXP) label.textContent = `🥇 ${p2.partnerName || 'P2'} is winning this month`;
          else label.textContent = `🤝 It's a tie!`;
        }
      });

      buildCharts(p1, p2, dailyData);
      renderRecentLog(logData || [], p1.partnerName, p2.partnerName);
    }

    function playerCard(p, cls, level, nextLevel) {
      const xp = p.monthXP || 0;
      const pct = xpProgressPct(xp);
      const name = p.partnerName || (cls === 'p1' ? 'Partner 1' : 'Partner 2');

      return `
        <div class="card player-card ${cls}">
          <div class="player-name">${name}</div>
          <div class="player-level">
            <span class="level-badge">${level.emoji} ${level.name}</span>
          </div>

          <div class="xp-label">Monthly XP</div>
          <div class="xp-big">${xp.toLocaleString()}</div>

          <div class="xp-progress">
            <div class="xp-progress-labels">
              <span>${level.name}</span>
              <span>${nextLevel ? `${nextLevel.name} in ${nextLevel.minXP - xp} XP` : '🏆 Max Level!'}</span>
            </div>
            <div class="xp-progress-bar-bg">
              <div class="xp-progress-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>

          <div class="mini-stats">
            <div class="mini-stat">
              <div class="mini-stat-val">${p.todayXP || 0}</div>
              <div class="mini-stat-label">Today</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-val">${p.weekXP || 0}</div>
              <div class="mini-stat-label">This Week</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-val">${(p.totalXP || 0).toLocaleString()}</div>
              <div class="mini-stat-label">All Time</div>
            </div>
          </div>
        </div>
      `;
    }

    function levelLadder(xp, cls) {
      return LEVELS.map(level => {
        const current = getLevelForXP(xp);
        const isActive = level.name === current.name;
        const isAchieved = xp > level.minXP && !isActive;

        return `
          <div class="level-row ${isActive ? 'active' : ''} ${isAchieved ? 'achieved' : ''}">
            <span class="emoji">${level.emoji}</span>
            <span class="level-name">${level.name}</span>
            <span class="level-xp">${level.minXP} XP</span>
            ${isActive ? `<span style="font-size:0.72rem;color:var(--${cls === 'p1' ? 'p1' : 'p2'}-light);font-weight:700">← YOU</span>` : ''}
          </div>
        `;
      }).join('');
    }

    function buildCharts(p1, p2, dailyData) {
      const p1Name = p1.partnerName || 'P1';
      const p2Name = p2.partnerName || 'P2';

      const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: '#9ca3af', font: { family: 'Space Grotesk', size: 11 } } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { family: 'Space Grotesk', size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { family: 'Space Grotesk' } }, beginAtZero: true },
        }
      };

      // Daily XP chart — real data from /api/daily
      const labels = dailyData?.dates?.map(d => {
        const dt = new Date(d);
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }) || [];

      new Chart(document.getElementById('weekChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: p1Name,
              data: dailyData?.p1Data || [],
              backgroundColor: 'rgba(124,106,245,0.65)',
              borderColor: '#7c6af5',
              borderWidth: 1,
              borderRadius: 5,
            },
            {
              label: p2Name,
              data: dailyData?.p2Data || [],
              backgroundColor: 'rgba(245,165,106,0.65)',
              borderColor: '#f5a56a',
              borderWidth: 1,
              borderRadius: 5,
            }
          ]
        },
        options: chartDefaults,
      });

      // Cumulative XP line chart for the month
      const p1Cumulative = [], p2Cumulative = [];
      let p1Sum = 0, p2Sum = 0;
      (dailyData?.p1Data || []).forEach((v, i) => {
        p1Sum += v;
        p2Sum += (dailyData?.p2Data?.[i] || 0);
        p1Cumulative.push(p1Sum);
        p2Cumulative.push(p2Sum);
      });

      new Chart(document.getElementById('monthChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: p1Name,
              data: p1Cumulative,
              borderColor: '#7c6af5',
              backgroundColor: 'rgba(124,106,245,0.1)',
              tension: 0.4,
              fill: true,
              pointRadius: labels.length < 15 ? 3 : 0,
              pointBackgroundColor: '#7c6af5',
            },
            {
              label: p2Name,
              data: p2Cumulative,
              borderColor: '#f5a56a',
              backgroundColor: 'rgba(245,165,106,0.1)',
              tension: 0.4,
              fill: true,
              pointRadius: labels.length < 15 ? 3 : 0,
              pointBackgroundColor: '#f5a56a',
            }
          ]
        },
        options: chartDefaults,
      });
    }

    function renderRecentLog(rows, p1Name, p2Name) {
      const logEl = document.getElementById('recent-log');
      if (!rows || rows.length === 0) {
        logEl.innerHTML = `<p style="color:var(--muted);text-align:center;padding:20px">No chores logged yet. Text your Twilio number to get started!</p>`;
        return;
      }

      const rowsHtml = rows.map(row => {
        const cls = row.partner === p1Name ? 'log-partner-p1' : 'log-partner-p2';
        return `
          <tr>
            <td>${row.date || '—'}</td>
            <td style="color:var(--muted)">${row.time || '—'}</td>
            <td class="${cls}">${row.partner || '—'}</td>
            <td>${row.chore || row.rawInput || '—'}</td>
            <td><span class="xp-pill">+${row.xp} XP</span></td>
          </tr>
        `;
      }).join('');

      logEl.innerHTML = `
        <table class="log-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Partner</th>
              <th>Chore</th>
              <th>XP</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadData();
    // Auto-refresh every 2 minutes
    setInterval(loadData, 120_000);
  </script>
</body>
</html>
