<!DOCTYPE html>
<!-- deploy test -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏠 Chore Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #5a8a3c;
      --bg2:       #4a7a30;
      --parchment: #f2e8c9;
      --parchment2:#e8d9a8;
      --parchment3:#dcc88a;
      --wood:      #8B5E3C;
      --wood-dark: #5c3a1e;
      --wood-light:#b07d4f;
      --border-in: #c9a96e;
      --text:      #3b2a1a;
      --text-light:#7a5c3a;
      --muted:     #9e7d55;
      --p1-color:  #7c4fa0;
      --p1-light:  #a673c4;
      --p2-color:  #c05a1f;
      --p2-light:  #e07840;
      --gold:      #d4a017;
      --green:     #4a8c3f;
      --green-light:#6ab85e;
      --red:       #c0392b;
      --radius:    4px;
      --gap:       16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 2px, transparent 2px, transparent 32px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 2px, transparent 2px, transparent 32px);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .pixel { font-family: 'Press Start 2P', monospace; }

    /* ── Wooden frame panels ── */
    .wood-panel {
      background: var(--parchment);
      border: 6px solid var(--wood);
      border-radius: 6px;
      box-shadow:
        inset 0 0 0 3px var(--wood-light),
        inset 0 0 0 5px var(--wood),
        4px 4px 0 var(--wood-dark),
        6px 6px 0 rgba(0,0,0,0.2);
      position: relative;
    }
    .wood-panel::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 2px solid var(--border-in);
      border-radius: 2px;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease;
    }
    .header-sign {
      display: inline-block;
      background: var(--wood);
      border: 4px solid var(--wood-dark);
      border-radius: 6px;
      padding: 14px 32px 16px;
      box-shadow: 4px 4px 0 var(--wood-dark), 6px 6px 0 rgba(0,0,0,0.25);
      position: relative;
    }
    .header-sign::before, .header-sign::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 12px; height: 12px;
      background: var(--wood-dark);
      border-radius: 50%;
      border: 2px solid #3a1e0a;
    }
    .header-sign::before { left: 30px; }
    .header-sign::after  { right: 30px; }
    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: var(--parchment);
      text-shadow: 2px 2px 0 var(--wood-dark), -1px -1px 0 rgba(0,0,0,0.3);
      letter-spacing: 2px;
      line-height: 1.4;
    }
    header p {
      color: var(--parchment3);
      margin-top: 8px;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
    }
    #last-updated {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.7rem;
      color: var(--parchment2);
      background: rgba(0,0,0,0.25);
      padding: 3px 10px;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
      letter-spacing: 0.05em;
    }

    /* ── Month banner ── */
    .month-banner {
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
      background: var(--wood-dark);
      display: inline-block;
      width: 100%;
      padding: 8px;
      border: 3px solid var(--wood);
      border-radius: 4px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }

    /* ── Grid layouts ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--gap); }
    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--parchment);
      border: 4px solid var(--wood);
      border-radius: 4px;
      padding: 18px;
      box-shadow: 3px 3px 0 var(--wood-dark), 5px 5px 0 rgba(0,0,0,0.15);
      animation: fadeUp 0.5s ease both;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1px solid var(--border-in);
      border-radius: 2px;
      pointer-events: none;
    }
    .card-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
      border-bottom: 2px solid var(--parchment3);
      padding-bottom: 8px;
    }

    /* ── Player cards ── */
    .player-card { padding: 20px; }
    .player-card.p1 { border-color: var(--p1-color); }
    .player-card.p2 { border-color: var(--p2-color); }
    .player-card.p1::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px; background: var(--p1-color);
    }
    .player-card.p2::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px; background: var(--p2-color);
    }
    .player-avatar {
      width: 48px; height: 48px;
      background: var(--parchment2);
      border: 3px solid var(--wood);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      float: left;
      margin-right: 12px;
      box-shadow: 2px 2px 0 var(--wood-dark);
      flex-shrink: 0;
    }
    .player-header { display: flex; align-items: flex-start; margin-bottom: 16px; }
    .player-info { flex: 1; }
    .player-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .p1 .player-name { color: var(--p1-color); }
    .p2 .player-name { color: var(--p2-color); }
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      font-weight: 600;
      border: 2px solid;
    }
    .p1 .level-badge { background: rgba(124,79,160,0.12); color: var(--p1-color); border-color: var(--p1-color); }
    .p2 .level-badge { background: rgba(192,90,31,0.12); color: var(--p2-color); border-color: var(--p2-color); }
    .xp-big {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.8rem;
      line-height: 1;
      margin: 12px 0 2px;
    }
    .p1 .xp-big { color: var(--p1-color); }
    .p2 .xp-big { color: var(--p2-color); }
    .xp-label { font-family: 'Press Start 2P', monospace; font-size: 0.48rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .xp-progress { margin-top: 14px; }
    .xp-progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 700;
    }
    .xp-bar-track {
      display: flex;
      gap: 2px;
      height: 14px;
      background: var(--parchment3);
      padding: 2px;
      border: 2px solid var(--wood);
      border-radius: 2px;
    }
    .xp-bar-segment {
      flex: 1;
      background: var(--parchment3);
      border-radius: 1px;
      transition: background 0.6s ease;
    }
    .xp-bar-segment.filled-p1 { background: var(--p1-color); }
    .xp-bar-segment.filled-p2 { background: var(--p2-color); }
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 2px solid var(--parchment3);
    }
    .mini-stat {
      text-align: center;
      background: var(--parchment2);
      border: 2px solid var(--parchment3);
      border-radius: 2px;
      padding: 8px 4px;
    }
    .mini-stat-val {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .p1 .mini-stat-val { color: var(--p1-color); }
    .p2 .mini-stat-val { color: var(--p2-color); }
    .mini-stat-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    /* ── VS Banner ── */
    .vs-banner {
      background: var(--parchment);
      border: 4px solid var(--wood);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: var(--gap);
      box-shadow: 3px 3px 0 var(--wood-dark), 5px 5px 0 rgba(0,0,0,0.15);
      animation: fadeUp 0.5s 0.1s ease both;
      position: relative;
    }
    .vs-banner::before {
      content: ''; position: absolute;
      inset: 2px; border: 1px solid var(--border-in);
      border-radius: 2px; pointer-events: none;
    }
    .vs-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .vs-name { font-family: 'Press Start 2P', monospace; font-size: 0.6rem; font-weight: 600; }
    .vs-name.p1 { color: var(--p1-color); }
    .vs-name.p2 { color: var(--p2-color); }
    .vs-bar-outer {
      height: 18px;
      background: var(--parchment3);
      border: 3px solid var(--wood);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .vs-bar-p1 {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, var(--p1-color) 0px, var(--p1-color) 10px, var(--p1-light) 10px, var(--p1-light) 20px);
      transition: width 1.4s cubic-bezier(.16,1,.3,1);
    }
    .vs-bar-p2-fill {
      position: absolute; right: 0; top: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, var(--p2-color) 0px, var(--p2-color) 10px, var(--p2-light) 10px, var(--p2-light) 20px);
    }
    .vs-center {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--gold);
      text-align: center;
      margin-top: 8px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }

    /* ── Charts ── */
    .chart-container {
      position: relative;
      height: 190px;
      background: var(--parchment2);
      border: 2px solid var(--parchment3);
      border-radius: 2px;
      padding: 8px;
    }

    /* ── Level ladder ── */
    .level-ladder { display: flex; flex-direction: column; gap: 4px; }
    .level-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 2px;
      border: 2px solid transparent;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .level-row.active { background: var(--parchment2); border-color: var(--parchment3); }
    .level-row.achieved { opacity: 0.35; }
    .level-row .emoji { width: 20px; text-align: center; }
    .level-icon { width: 20px; height: 20px; object-fit: contain; vertical-align: middle; image-rendering: pixelated; }
    .level-row .level-name { flex: 1; font-weight: 700; font-size: 0.8rem; color: var(--text); }
    .level-row .level-xp { font-family: 'Press Start 2P', monospace; font-size: 0.48rem; color: var(--muted); }
    .you-tag { font-family: 'Press Start 2P', monospace; font-size: 0.42rem; font-weight: 700; padding: 2px 5px; border-radius: 2px; }
    .you-tag-p1 { background: var(--p1-color); color: white; }
    .you-tag-p2 { background: var(--p2-color); color: white; }

    /* ── Recent log ── */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      text-align: left;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 8px 10px;
      border-bottom: 2px solid var(--parchment3);
    }
    .log-table td {
      padding: 9px 8px;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--parchment3);
      color: var(--text);
    }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table tr:hover td { background: var(--parchment2); }
    .log-partner-p1 { color: var(--p1-color); font-weight: 700; }
    .log-partner-p2 { color: var(--p2-color); font-weight: 700; }
    .xp-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      font-weight: 700;
      background: var(--green);
      color: #fff;
      border: 1px solid var(--green-light);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }

    /* ── Loading / error states ── */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      line-height: 2;
    }
    .loading-state .spinner {
      width: 28px; height: 28px;
      border: 4px solid var(--parchment3);
      border-top-color: var(--p1-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* ── Section headers ── */
    .section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: var(--parchment);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    }
    .section-title::before, .section-title::after {
      content: ''; flex: 1; height: 2px;
      background: rgba(255,255,255,0.25);
    }

    /* ── Config banner ── */
    .config-notice {
      background: rgba(212,160,23,0.15);
      border: 3px solid var(--gold);
      border-radius: 4px;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--wood-dark);
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.8;
    }

    .coin { display: inline-block; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; border: 1px solid #a07800; vertical-align: middle; margin-right: 3px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.18s; }
    .card:nth-child(4) { animation-delay: 0.24s; }

    .divider { text-align: center; color: var(--parchment3); font-size: 1rem; margin: 4px 0; letter-spacing: 8px; }

    /* ────────────────────────────────────────────────
       LOG A CHORE PANEL
    ──────────────────────────────────────────────── */
    .log-panel {
      background: var(--parchment);
      border: 4px solid var(--wood);
      border-radius: 4px;
      padding: 20px 22px 22px;
      box-shadow: 3px 3px 0 var(--wood-dark), 5px 5px 0 rgba(0,0,0,0.15);
      margin-bottom: var(--gap);
      position: relative;
      animation: fadeUp 0.4s ease both;
    }
    .log-panel::before {
      content: ''; position: absolute;
      inset: 2px; border: 1px solid var(--border-in);
      border-radius: 2px; pointer-events: none;
    }
    .log-panel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.58rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--parchment3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Person toggle */
    .person-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .person-btn {
      flex: 1;
      padding: 10px 8px;
      border: 3px solid var(--parchment3);
      border-radius: 3px;
      background: var(--parchment2);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .person-btn:hover { background: var(--parchment); }
    .person-btn.active-p1 {
      background: rgba(124,79,160,0.1);
      border-color: var(--p1-color);
      color: var(--p1-color);
      box-shadow: 2px 2px 0 rgba(124,79,160,0.3);
    }
    .person-btn.active-p2 {
      background: rgba(192,90,31,0.1);
      border-color: var(--p2-color);
      color: var(--p2-color);
      box-shadow: 2px 2px 0 rgba(192,90,31,0.3);
    }

    /* Chore combobox */
    .chore-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .chore-input {
      width: 100%;
      padding: 11px 14px;
      border: 3px solid var(--wood);
      border-radius: 3px;
      background: var(--parchment2);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .chore-input:focus {
      border-color: var(--wood-light);
      box-shadow: 0 0 0 2px rgba(139,94,60,0.2);
    }
    .chore-input::placeholder { color: var(--muted); }

    .chore-date-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .chore-date-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--text-light);
      white-space: nowrap;
    }
    .chore-date-input {
      flex: 1;
      padding: 9px 12px;
      border: 2px solid var(--wood);
      border-radius: var(--radius);
      background: var(--parchment2);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .chore-date-input:focus {
      outline: none;
      border-color: var(--wood-light);
      box-shadow: 0 0 0 2px rgba(139,94,60,0.2);
    }

    .chore-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--parchment);
      border: 3px solid var(--wood);
      border-radius: 3px;
      box-shadow: 3px 3px 0 var(--wood-dark), 0 8px 24px rgba(0,0,0,0.18);
      z-index: 100;
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }
    .chore-dropdown.open { display: block; }

    .chore-option {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--parchment3);
      transition: background 0.1s;
      gap: 10px;
    }
    .chore-option:last-child { border-bottom: none; }
    .chore-option:hover, .chore-option.highlighted {
      background: var(--parchment2);
    }
    .chore-option-name {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 700;
    }
    .chore-option-name mark {
      background: var(--gold);
      color: var(--wood-dark);
      border-radius: 1px;
      padding: 0 1px;
    }
    .chore-option-xp {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.44rem;
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chore-no-results {
      padding: 12px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--muted);
      text-align: center;
    }

    /* Submit button */
    .log-submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: 3px solid var(--green-light);
      border-radius: 3px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.58rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 #2e5e24;
      transition: all 0.1s;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .log-submit-btn:hover:not(:disabled) {
      background: var(--green-light);
      transform: translateY(-1px);
      box-shadow: 4px 4px 0 #2e5e24;
    }
    .log-submit-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 1px 1px 0 #2e5e24;
    }
    .log-submit-btn:disabled {
      background: var(--muted);
      border-color: var(--text-light);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .log-submit-btn .btn-spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--wood-dark);
      color: var(--parchment);
      border: 3px solid var(--wood);
      border-radius: 4px;
      padding: 12px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      line-height: 1.7;
      text-align: center;
      z-index: 999;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
      transition: transform 0.35s cubic-bezier(.16,1,.3,1), opacity 0.35s;
      opacity: 0;
      min-width: 220px;
      max-width: 90vw;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-color: var(--green-light); }
    .toast.error   { border-color: var(--red); }
    .toast-xp {
      font-size: 0.9rem;
      color: var(--gold);
      display: block;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-sign">
        <h1>🏠 Chore Quest</h1>
        <p>Household XP tracker — adulting deserves rewards</p>
        <div><span id="last-updated">Loading...</span></div>
      </div>
    </header>

    <!-- Log a Chore Panel (always visible, above stats) -->
    <div class="section-title">⚔️ Log a Chore</div>
    <div class="log-panel" id="log-panel">
      <div class="log-panel-title">✨ Who completed a chore?</div>

      <!-- Person selector -->
      <div class="person-toggle">
        <button class="person-btn" id="btn-p1" onclick="selectPerson('p1')">👩‍🌾 <span id="btn-p1-label">Partner 1</span></button>
        <button class="person-btn" id="btn-p2" onclick="selectPerson('p2')">🧑‍🌾 <span id="btn-p2-label">Partner 2</span></button>
      </div>

      <!-- Chore combobox -->
      <div class="chore-input-wrap">
        <input
          type="text"
          id="chore-input"
          class="chore-input"
          placeholder="Start typing a chore..."
          autocomplete="off"
          onInput="onChoreInput()"
          onFocus="onChoreFocus()"
          onKeyDown="onChoreKeyDown(event)"
        />
        <div class="chore-dropdown" id="chore-dropdown"></div>
      </div>

      <!-- Date selector -->
      <div class="chore-date-wrap">
        <label class="chore-date-label" for="chore-date">📅 Date</label>
        <input type="date" id="chore-date" class="chore-date-input" />
      </div>

      <button class="log-submit-btn" id="log-submit-btn" onclick="submitChore()" disabled>
        <span id="btn-text">✔ Log Chore</span>
      </button>
    </div>

    <div id="app">
      <div class="loading-state card">
        <div class="spinner"></div>
        <div>Loading your farm stats...</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────────
    const API_BASE = window.WORKER_URL || 'https://chore-tracker.kayla-a-mandel.workers.dev';

    const LEVELS = [
      { name: 'Fresh Sprout',       minXP: 0,    emoji: 'Mixed_Seeds.png' },
      { name: 'New to the Farm',    minXP: 50,   emoji: 'Steel_Watering_Can.png' },
      { name: 'Learning the Land',  minXP: 125,  emoji: 'Gold_Hoe.png' },
      { name: 'Tending the Plot',   minXP: 250,  emoji: 'Corn.png' },
      { name: 'Full-Time Farmer',   minXP: 400,  emoji: 'Scarecrow.png' },
      { name: 'Harvest Ready',      minXP: 600,  emoji: 'Wheat.png' },
      { name: 'Keeper of the Farm', minXP: 850,  emoji: 'House.png' },
      { name: 'Master of the Land', minXP: 1150, emoji: 'Gold_Pickaxe.png' },
      { name: 'Legendary Farmer',   minXP: 1500, emoji: 'Iridium_Scythe.png' },
    ];

    const TOTAL_SEGMENTS = 16;

    // Populated on init from /api/chores — stays in sync with worker automatically
    let CHORE_LIST = [];

    // ── Log panel state ──────────────────────────────────────────────────────────
    let selectedPerson = null;  // 'p1' or 'p2'
    let selectedChore  = null;  // { name, xp }
    let highlightedIdx = -1;
    let filteredChores = [];
    let p1Name = 'Partner 1';
    let p2Name = 'Partner 2';

    function selectPerson(who) {
      selectedPerson = who;
      document.getElementById('btn-p1').className = 'person-btn' + (who === 'p1' ? ' active-p1' : '');
      document.getElementById('btn-p2').className = 'person-btn' + (who === 'p2' ? ' active-p2' : '');
      updateSubmitState();
    }

    function onChoreInput() {
      selectedChore = null;
      renderDropdown();
      updateSubmitState();
    }

    function onChoreFocus() {
      renderDropdown();
    }

    function onChoreKeyDown(e) {
      const dd = document.getElementById('chore-dropdown');
      const isOpen = dd.classList.contains('open');

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightedIdx = Math.min(highlightedIdx + 1, filteredChores.length - 1);
        refreshHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightedIdx = Math.max(highlightedIdx - 1, 0);
        refreshHighlight();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (isOpen && highlightedIdx >= 0 && filteredChores[highlightedIdx]) {
          pickChore(filteredChores[highlightedIdx]);
        } else if (selectedChore && selectedPerson) {
          submitChore();
        }
      } else if (e.key === 'Escape') {
        closeDropdown();
      }
    }

    function renderDropdown() {
      const query = document.getElementById('chore-input').value.trim().toLowerCase();
      const dd = document.getElementById('chore-dropdown');

      // Filter & sort: prefix matches first, then substring
      filteredChores = CHORE_LIST
        .map(c => ({ ...c, _score: scoreChore(c.name.toLowerCase(), query) }))
        .filter(c => c._score > 0)
        .sort((a, b) => b._score - a._score || a.name.localeCompare(b.name));

      // If no query, show all sorted alphabetically
      if (!query) {
        filteredChores = [...CHORE_LIST].sort((a, b) => a.name.localeCompare(b.name));
      }

      highlightedIdx = filteredChores.length > 0 ? 0 : -1;

      if (filteredChores.length === 0) {
        dd.innerHTML = `<div class="chore-no-results">No matching chores</div>`;
      } else {
        dd.innerHTML = filteredChores.map((c, i) => `
          <div class="chore-option ${i === highlightedIdx ? 'highlighted' : ''}"
               onmousedown="pickChore(filteredChores[${i}])"
               onmouseover="highlightedIdx=${i};refreshHighlight()">
            <span class="chore-option-name">${highlightName(c.name, query)}</span>
            <span class="chore-option-xp">+${c.xp} XP</span>
          </div>
        `).join('');
      }

      dd.classList.add('open');

      // Close on outside click
      document.addEventListener('click', outsideClick, { once: true, capture: true });
    }

    function outsideClick(e) {
      const wrap = document.querySelector('.chore-input-wrap');
      if (!wrap.contains(e.target)) {
        closeDropdown();
      } else {
        // Re-register if click was inside
        document.addEventListener('click', outsideClick, { once: true, capture: true });
      }
    }

    function closeDropdown() {
      document.getElementById('chore-dropdown').classList.remove('open');
    }

    function refreshHighlight() {
      const items = document.querySelectorAll('.chore-option');
      items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIdx));
      if (items[highlightedIdx]) {
        items[highlightedIdx].scrollIntoView({ block: 'nearest' });
      }
    }

    function pickChore(chore) {
      selectedChore = chore;
      document.getElementById('chore-input').value = chore.name;
      closeDropdown();
      updateSubmitState();
    }

    function scoreChore(name, query) {
      if (!query) return 1;
      if (name === query) return 100;
      if (name.startsWith(query)) return 80;
      if (name.includes(query)) return 50;
      // word-start match
      const words = name.split(' ');
      if (words.some(w => w.startsWith(query))) return 65;
      return 0;
    }

    function highlightName(name, query) {
      if (!query) return name;
      const idx = name.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return name;
      return name.slice(0, idx) + `<mark>${name.slice(idx, idx + query.length)}</mark>` + name.slice(idx + query.length);
    }

    function updateSubmitState() {
      const btn = document.getElementById('log-submit-btn');
      btn.disabled = !(selectedPerson && selectedChore);
    }

    async function submitChore() {
      if (!selectedPerson || !selectedChore) return;

      const btn = document.getElementById('log-submit-btn');
      const btnText = document.getElementById('btn-text');
      btn.disabled = true;
      btnText.innerHTML = `<span class="btn-spinner"></span> Logging...`;

      try {
        const personName = selectedPerson === 'p1' ? p1Name : p2Name;
        const res = await fetch(`${API_BASE}/api/log`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            partner: personName,
            chore: selectedChore.name,
            date: document.getElementById('chore-date').value,
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json().catch(() => ({}));
        const xpEarned = result.xp || selectedChore.xp;

        showToast('success', `${personName} logged "${selectedChore.name}"!`, `+${xpEarned} XP earned`);

        // Reset form
        document.getElementById('chore-input').value = '';
        selectedChore = null;
        updateSubmitState();

        // Refresh stats after a short delay
        setTimeout(loadData, 1200);
      } catch (err) {
        showToast('error', 'Could not log chore', err.message);
      } finally {
        btnText.innerHTML = '✔ Log Chore';
        updateSubmitState();
      }
    }

    let toastTimer = null;
    function showToast(type, line1, line2) {
      const toast = document.getElementById('toast');
      toast.className = `toast ${type}`;
      toast.innerHTML = line1 + (line2 ? `<span class="toast-xp">${line2}</span>` : '');
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── Data helpers ──────────────────────────────────────────────────────────────
    function getLevelForXP(xp) {
      return LEVELS.reduce((best, l) => xp >= l.minXP ? l : best, LEVELS[0]);
    }
    function getNextLevel(xp) {
      return LEVELS.find(l => l.minXP > xp) || null;
    }
    function xpProgressPct(xp) {
      const curr = getLevelForXP(xp);
      const next = getNextLevel(xp);
      if (!next) return 100;
      return Math.round(((xp - curr.minXP) / (next.minXP - curr.minXP)) * 100);
    }

    // ── Fetch & render ───────────────────────────────────────────────────────────
    async function loadData() {
      try {
        const [statsRes, dailyRes, logRes, levelsRes, choresRes] = await Promise.all([
          fetch(`${API_BASE}/api/stats`),
          fetch(`${API_BASE}/api/daily`),
          fetch(`${API_BASE}/api/log`),
          fetch(`${API_BASE}/api/levels`).catch(() => null),
          fetch(`${API_BASE}/api/chores`).catch(() => null),
        ]);
        if (!statsRes.ok) throw new Error(`Stats API: HTTP ${statsRes.status}`);

        const [statsData, dailyData, logData, levelsData, choresData] = await Promise.all([
          statsRes.json(),
          dailyRes.ok ? dailyRes.json() : null,
          logRes.ok ? logRes.json() : [],
          levelsRes && levelsRes.ok ? levelsRes.json() : Promise.resolve(null),
          choresRes && choresRes.ok ? choresRes.json() : Promise.resolve(null),
        ]);

        if (Array.isArray(levelsData) && levelsData.length) LEVELS.splice(0, LEVELS.length, ...levelsData);
        if (Array.isArray(choresData) && choresData.length) CHORE_LIST = choresData;

        // Update person names in log panel
        if (statsData.partner1?.partnerName) {
          p1Name = statsData.partner1.partnerName;
          document.getElementById('btn-p1-label').textContent = p1Name;
        }
        if (statsData.partner2?.partnerName) {
          p2Name = statsData.partner2.partnerName;
          document.getElementById('btn-p2-label').textContent = p2Name;
        }

        render(statsData, dailyData, logData);
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="config-notice">
            ⚠️ Could not connect to the worker API.<br>Update API_BASE to your deployed Worker URL, then refresh.<br><br>Error: ${err.message}
          </div>
        `;
      }
    }

    function render(data, dailyData, logData) {
      const { partner1: p1, partner2: p2 } = data;
      const now = new Date();
      const monthName = now.toLocaleString('default', { month: 'long', year: 'numeric' });

      const totalBoth = (p1.monthXP || 0) + (p2.monthXP || 0);
      const p1Pct = totalBoth ? Math.round((p1.monthXP / totalBoth) * 100) : 50;
      const p2Pct = 100 - p1Pct;

      document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString()}`;

      document.getElementById('app').innerHTML = `
        <div class="month-banner">⚔️ ${monthName} — Rankings Reset Each Month ⚔️</div>

        <!-- VS banner -->
        <div class="vs-banner">
          <div class="vs-label-row">
            <span class="vs-name p1">${p1.partnerName || 'Partner 1'} — ${p1.monthXP} XP</span>
            <span class="vs-name p2">${p2.partnerName || 'Partner 2'} — ${p2.monthXP} XP</span>
          </div>
          <div class="vs-bar-outer">
            <div class="vs-bar-p1" id="vs-bar" style="width:0%"></div>
            <div class="vs-bar-p2-fill" id="vs-bar-p2" style="width:0%"></div>
          </div>
          <div class="vs-center" id="vs-label">...</div>
        </div>

        <!-- Player cards -->
        <div class="grid-2">
          ${playerCard(p1, 'p1')}
          ${playerCard(p2, 'p2')}
        </div>

        <!-- Charts -->
        <div class="section-title">📈 Weekly Activity</div>
        <div class="grid-2">
          <div class="card">
            <div class="card-label">XP by Day (This Week)</div>
            <div class="chart-container">
              <canvas id="weekChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-label">Monthly XP Trend</div>
            <div class="chart-container">
              <canvas id="monthChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Level ladder -->
        <div class="section-title">🎮 Level Ladder</div>
        <div class="grid-2">
          <div class="card">
            <div class="card-label">${p1.partnerName || 'Partner 1'}'s Progress</div>
            <div class="level-ladder">${levelLadder(p1.monthXP || 0, 'p1')}</div>
          </div>
          <div class="card">
            <div class="card-label">${p2.partnerName || 'Partner 2'}'s Progress</div>
            <div class="level-ladder">${levelLadder(p2.monthXP || 0, 'p2')}</div>
          </div>
        </div>

        <!-- Recent log -->
        <div class="section-title">📋 Recent Chores</div>
        <div class="card">
          <div id="recent-log">
            <div class="loading-state" style="padding:20px">
              <div class="spinner" style="width:20px;height:20px;border-width:3px"></div>
            </div>
          </div>
        </div>
      `;

      requestAnimationFrame(() => {
        const bar = document.getElementById('vs-bar');
        const bar2 = document.getElementById('vs-bar-p2');
        if (bar) setTimeout(() => {
          bar.style.width = `${p1Pct}%`;
          bar2.style.width = `${p2Pct}%`;
        }, 100);
        const label = document.getElementById('vs-label');
        if (label) {
          if (p1.monthXP > p2.monthXP) label.textContent = `🥇 ${p1.partnerName || 'P1'} is winning this month!`;
          else if (p2.monthXP > p1.monthXP) label.textContent = `🥇 ${p2.partnerName || 'P2'} is winning this month!`;
          else label.textContent = `🤝 It's a tie!`;
        }
      });

      buildCharts(p1, p2, dailyData);
      renderRecentLog(logData || [], p1.partnerName, p2.partnerName);
    }

    function playerCard(p, cls) {
      const xp = p.monthXP || 0;
      const pct = xpProgressPct(xp);
      const level = getLevelForXP(xp);
      const nextLevel = getNextLevel(xp);
      const name = p.partnerName || (cls === 'p1' ? 'Partner 1' : 'Partner 2');
      const avatar = cls === 'p1' ? '👩‍🌾' : '🧑‍🌾';
      const filledSegs = Math.round((pct / 100) * TOTAL_SEGMENTS);

      const segments = Array.from({ length: TOTAL_SEGMENTS }, (_, i) =>
        `<div class="xp-bar-segment ${i < filledSegs ? `filled-${cls}` : ''}"></div>`
      ).join('');

      return `
        <div class="card player-card ${cls}">
          <div class="player-header">
            <div class="player-avatar">${avatar}</div>
            <div class="player-info">
              <div class="player-name">${name}</div>
              <span class="level-badge"><img src="stardew_icons/${level.emoji}" class="level-icon"> ${level.name}</span>
            </div>
          </div>
          <div class="xp-label">Monthly XP</div>
          <div class="xp-big">${xp.toLocaleString()}</div>
          <div class="xp-progress">
            <div class="xp-progress-header">
              <span>${level.name}</span>
              <span>${nextLevel ? `${nextLevel.minXP - xp} XP to ${nextLevel.name}` : '🏆 Max Level!'}</span>
            </div>
            <div class="xp-bar-track">${segments}</div>
          </div>
          <div class="mini-stats">
            <div class="mini-stat">
              <div class="mini-stat-val">${p.todayXP || 0}</div>
              <div class="mini-stat-label">Today</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-val">${p.weekXP || 0}</div>
              <div class="mini-stat-label">This Week</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-val">${(p.totalXP || 0).toLocaleString()}</div>
              <div class="mini-stat-label">All Time</div>
            </div>
          </div>
        </div>
      `;
    }

    function levelLadder(xp, cls) {
      return LEVELS.map(level => {
        const current = getLevelForXP(xp);
        const isActive = level.name === current.name;
        const isAchieved = xp > level.minXP && !isActive;
        return `
          <div class="level-row ${isActive ? 'active' : ''} ${isAchieved ? 'achieved' : ''}">
            <img src="stardew_icons/${level.emoji}" class="level-icon emoji">
            <span class="level-name">${level.name}</span>
            <span class="level-xp">${level.minXP} XP</span>
            ${isActive ? `<span class="you-tag you-tag-${cls}">YOU</span>` : ''}
          </div>
        `;
      }).join('');
    }

    function buildCharts(p1, p2, dailyData) {
      const p1Name = p1.partnerName || 'P1';
      const p2Name = p2.partnerName || 'P2';
      const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, labels: { color: '#7a5c3a', font: { family: 'Lato', size: 11 }, boxWidth: 12 } }
        },
        scales: {
          x: {
            grid: { color: 'rgba(139,94,60,0.1)' },
            ticks: { color: '#9e7d55', font: { family: 'Lato', size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }
          },
          y: {
            grid: { color: 'rgba(139,94,60,0.1)' },
            ticks: { color: '#9e7d55', font: { family: 'Lato' } },
            beginAtZero: true
          },
        }
      };

      const labels = dailyData?.dates?.map(d => {
        const dt = new Date(d);
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }) || [];

      new Chart(document.getElementById('weekChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: p1Name, data: dailyData?.p1Data || [], backgroundColor: 'rgba(124,79,160,0.7)', borderColor: '#7c4fa0', borderWidth: 2, borderRadius: 2 },
            { label: p2Name, data: dailyData?.p2Data || [], backgroundColor: 'rgba(192,90,31,0.7)', borderColor: '#c05a1f', borderWidth: 2, borderRadius: 2 }
          ]
        },
        options: chartDefaults,
      });

      const p1Cumulative = [], p2Cumulative = [];
      let p1Sum = 0, p2Sum = 0;
      (dailyData?.p1Data || []).forEach((v, i) => {
        p1Sum += v;
        p2Sum += (dailyData?.p2Data?.[i] || 0);
        p1Cumulative.push(p1Sum);
        p2Cumulative.push(p2Sum);
      });

      new Chart(document.getElementById('monthChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: p1Name, data: p1Cumulative, borderColor: '#7c4fa0', backgroundColor: 'rgba(124,79,160,0.12)', tension: 0.4, fill: true, pointRadius: labels.length < 15 ? 3 : 0, pointBackgroundColor: '#7c4fa0', borderWidth: 2 },
            { label: p2Name, data: p2Cumulative, borderColor: '#c05a1f', backgroundColor: 'rgba(192,90,31,0.12)', tension: 0.4, fill: true, pointRadius: labels.length < 15 ? 3 : 0, pointBackgroundColor: '#c05a1f', borderWidth: 2 }
          ]
        },
        options: chartDefaults,
      });
    }

    function renderRecentLog(rows, p1Name, p2Name) {
      const logEl = document.getElementById('recent-log');
      if (!rows || rows.length === 0) {
        logEl.innerHTML = `<p style="color:var(--muted);text-align:center;padding:20px;font-family:'Press Start 2P',monospace;font-size:0.55rem;line-height:2">No chores logged yet.<br>Text your Twilio number to get started!</p>`;
        return;
      }
      const rowsHtml = rows.map(row => {
        const cls = row.partner === p1Name ? 'log-partner-p1' : 'log-partner-p2';
        return `
          <tr>
            <td>${row.date || '—'}</td>
            <td style="color:var(--muted)">${row.time || '—'}</td>
            <td class="${cls}">${row.partner || '—'}</td>
            <td>${row.chore || row.rawInput || '—'}</td>
            <td><span class="xp-pill">+${row.xp} XP</span></td>
          </tr>
        `;
      }).join('');
      logEl.innerHTML = `
        <table class="log-table">
          <thead>
            <tr>
              <th>Date</th><th>Time</th><th>Partner</th><th>Chore</th><th>XP</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `;
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    document.getElementById('chore-date').value = new Date().toLocaleDateString('en-CA');
    loadData();
    setInterval(loadData, 120_000);
  </script>
</body>
