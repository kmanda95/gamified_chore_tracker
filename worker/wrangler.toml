name = "chore-tracker"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Environment Variables (non-secret) ───────────────────────────────────────
[vars]
# Filled in below via secrets — do NOT put sensitive values here

# ─── Secrets ──────────────────────────────────────────────────────────────────
# Set these via: wrangler secret put SECRET_NAME
#
# Required secrets:
#   GOOGLE_SERVICE_ACCOUNT_JSON   — full JSON of your GCP service account key
#   GOOGLE_SHEET_ID               — the ID from your Google Sheet URL
#   PARTNER1_PHONE                — e.g. "+15551234567"
#   PARTNER1_NAME                 — e.g. "Alex"
#   PARTNER2_PHONE                — e.g. "+15559876543"
#   PARTNER2_NAME                 — e.g. "Jordan"
#   TWILIO_AUTH_TOKEN             — for webhook signature validation (optional but recommended)
